name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'src/lib/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Root install provides the shared UI library's node_modules (fonts resolve
      # relative to src/lib/design) and runs svelte-kit sync (root .svelte-kit),
      # both needed to compile the $ui components into the landing.
      - name: Install shared lib (root)
        run: npm install
      - name: Install landing
        working-directory: landing
        run: npm install
      - name: Build landing
        working-directory: landing
        run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: landing/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
